      ld.querySelector('.spinner').style.display = 'none';
      ld.querySelector('p').textContent = 'Error: ' + (e.message || 'unknown') + ' — check console';
      ld.querySelector('p').style.color = '#f87171';
    }
  });
  setTimeout(function() {
    var ld = document.getElementById('loading');
    if (ld && ld.parentNode) {

      ld.querySelector('p').textContent = 'Slow load — check network or open browser console';

</script>

function resolveRef(refItem) {
  if (!refItem || !refItem.id) return null;
  switch (refItem.type) {
    case 'LOOKUP_TABLE':  return LUTS.find(l => l.id === refItem.id) || null;
    case 'RULES_SIGNAL':
    case 'AI_SIGNAL':    return SIGNALS.find(s => s.id === refItem.id) || null;
    case 'INTEGRATION':    return INTEGRATIONS.find(i => i.id === refItem.id) || null;
    case 'SALESFORCE':     return INTEGRATIONS.find(i => i.id === refItem.id) || null;
    case 'SMART_ALERT':    return SMART_ALERTS.find(a => a.id === refItem.id) || null;
    case 'DATA_DELIVERY':  return DATA_DELIVERIES.find(d => d.id === refItem.id) || null;
    case 'WEBHOOK':        return WEBHOOKS.find(w => w.id === refItem.id) || null;
    default:             return null;
  }
}

function TypeBadge({ type }) {

  return <span style={{ background:c.bg, color:c.text, fontSize:11, fontWeight:600, padding:'1px 7px', borderRadius:10 }}>{type}</span>;
}
function TagPill({ tag }) {
  const m = TAG_META[tag];
  if (!m) return null;
  return <span style={{ background:m.bg, color:m.text, fontSize:11, fontWeight:500, padding:'2px 8px', borderRadius:10 }}>{m.label}</span>;
}
function HiddenBadge() {
  return <span style={{ fontSize:10, fontWeight:700, letterSpacing:'0.04em', background:'#f1f5f9', color:'#94a3b8', padding:'1px 6px', borderRadius:8, textTransform:'uppercase' }}>Hidden</span>;

function NotInUseBadge({ feature }) {

// icon + full label, clickable → inspector
function RefTag({ item, onClick, showMapping = false }) {
  const m = REF_META[item.type] || REF_META['INVOCA_PLATFORM'];
  const Icon = REF_ICON[item.type] || IcoPlatform;
  return (
    <button
      className="ref-tag-btn"
      onClick={onClick ? () => onClick(item) : undefined}
      style={{ background:'#f8fafc', color: item.paused ? '#94a3b8' : '#374151', border:'none', opacity: item.paused ? 0.75 : 1 }}
    >
      <span style={{ color: item.paused ? '#94a3b8' : m.color, flexShrink:0, display:'flex', alignItems:'center' }}><Icon /></span>
      <span style={{ whiteSpace:'normal', lineHeight:1.3 }}>{item.name}</span>
      {showMapping && item.externalFieldName && (
        <span style={{ fontSize:11, color:'#64748b', background:'#f1f5f9', border:'1px solid #e2e8f0', borderRadius:4, padding:'1px 6px', fontFamily:'ui-monospace,monospace', fontWeight:500, flexShrink:0 }}>→ {item.externalFieldName}</span>
      )}
      {item.role === 'match_key' && <span style={{ fontSize:10, color:'#64748b', background:'#e2e8f0', borderRadius:4, padding:'1px 5px', fontWeight:600, flexShrink:0 }}>key</span>}
      {item.paused && <span className="material-symbols-outlined" style={{ fontSize:13, color:'#f59e0b', marginLeft:2, flexShrink:0 }}>pause_circle</span>}
    </button>
  );
}

// multi-select dropdown
function MultiSelect({ label, options, selected, onChange, colorFn }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const count = selected.length;
  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button onClick={() => setOpen(v => !v)} style={{ display:'flex', alignItems:'center', gap:5, padding:'5px 10px', borderRadius:6, border:'1px solid #e2e8f0', background:count>0?'#eff6ff':'white', fontSize:13, fontWeight:500, color:count>0?'#1d4ed8':'#475569', cursor:'pointer', whiteSpace:'nowrap' }}>
        {label}{count > 0 && <span style={{ background:'#3b82f6', color:'white', borderRadius:'50%', width:16, height:16, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700 }}>{count}</span>}
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ opacity:.5 }}><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>
      </button>
      {open && (
        <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, background:'white', border:'1px solid #e2e8f0', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,.1)', zIndex:200, minWidth:190, maxHeight:260, overflowY:'auto', padding:'4px 0' }}>
          {options.map(opt => {
            const checked = selected.includes(opt.value);
            return (
              <button key={opt.value} onClick={() => onChange(checked ? selected.filter(v=>v!==opt.value) : [...selected, opt.value])}
                style={{ display:'flex', alignItems:'center', gap:8, width:'100%', padding:'6px 12px', background:checked?'#f8faff':'transparent', border:'none', cursor:'pointer', textAlign:'left' }}>
                <div style={{ width:14, height:14, border:`1.5px solid ${checked?'#3b82f6':'#cbd5e1'}`, borderRadius:3, background:checked?'#3b82f6':'white', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  {checked && <svg width="9" height="7" viewBox="0 0 9 7"><path d="M1 3.5L3.3 5.8L8 1" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/></svg>}
                </div>
                {colorFn ? <span style={{ ...colorFn(opt.value), fontSize:12, fontWeight:500, padding:'1px 7px', borderRadius:8 }}>{opt.label}</span>
                  : <span style={{ fontSize:13, color:'#374151' }}>{opt.label}</span>}
              </button>
            );
          })}
          {count > 0 && (
            <button onClick={() => onChange([])} style={{ width:'100%', padding:'6px 12px', borderTop:'1px solid #f1f5f9', color:'#64748b', fontSize:12, background:'none', border:'none', cursor:'pointer', textAlign:'left', marginTop:2 }}>
              Clear all
            </button>
          )}
        </div>
      )}
    </div>
  );
}

    <div style={{ background:'#1a2035', height:52, display:'flex', alignItems:'center', flexShrink:0, borderBottom:'1px solid rgba(255,255,255,.07)' }}>

      <div style={{ width:64, height:52, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
        <div style={{ width:28, height:28, borderRadius:6, background:'#00b87a', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="1" y="1" width="5" height="5" rx="1" fill="white" opacity="0.9"/>
            <rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity="0.6"/>
            <rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity="0.6"/>
            <rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity="0.9"/>

          <span className="material-symbols-outlined" style={{ fontSize:14, opacity:.7 }}>corporate_fare</span>
          iTelecom
          <svg width="9" height="9" viewBox="0 0 10 10" fill="none" style={{ opacity:.5 }}><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
        </button>
        <span style={{ color:'rgba(255,255,255,.25)', fontSize:14 }}>›</span>

          All Campaigns
          <svg width="9" height="9" viewBox="0 0 10 10" fill="none" style={{ opacity:.5 }}><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
        </button>
      </div>

      {/* Search */}
      <div style={{ flex:1, maxWidth:380, position:'relative' }}>
        <span className="material-symbols-outlined" style={{ position:'absolute', left:9, top:'50%', transform:'translateY(-50%)', fontSize:15, color:'rgba(255,255,255,.35)', pointerEvents:'none' }}>search</span>
        <input placeholder="Search…" style={{ width:'100%', background:'rgba(255,255,255,.09)', border:'1px solid rgba(255,255,255,.12)', borderRadius:8, padding:'6px 12px 6px 30px', fontSize:13, color:'white', outline:'none', boxSizing:'border-box' }}
          onFocus={e=>{e.target.style.background='rgba(255,255,255,.13)';e.target.style.borderColor='rgba(255,255,255,.25)';}}
          onBlur={e=>{e.target.style.background='rgba(255,255,255,.09)';e.target.style.borderColor='rgba(255,255,255,.12)';}} />

      {/* Right icons */}
      <div style={{ display:'flex', alignItems:'center', gap:2, marginLeft:'auto', paddingRight:16 }}>
        {['notifications', 'star', 'help_outline'].map(icon => (
          <button key={icon} style={{ width:34, height:34, borderRadius:7, background:'none', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'rgba(255,255,255,.55)', transition:'all .12s' }}
            onMouseOver={e=>{e.currentTarget.style.background='rgba(255,255,255,.08)';e.currentTarget.style.color='rgba(255,255,255,.9)';}}
            onMouseOut={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color='rgba(255,255,255,.55)';}}>
            <span className="material-symbols-outlined" style={{ fontSize:19 }}>{icon}</span>
          </button>
        ))}
        <div style={{ width:30, height:30, borderRadius:'50%', background:'#00b87a', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', marginLeft:6, flexShrink:0 }}>

        </div>

  );
}

// ─────────────────────────────────────────────
// 7. INSPECTOR CONTENT
// ─────────────────────────────────────────────

function InfoRow({ label, value }) {
  if (!value && value !== 0) return null;
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:3, marginBottom:12 }}>
      <div style={{ fontSize:11, fontWeight:600, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.05em' }}>{label}</div>
      <div style={{ fontSize:13, color:'#1e293b', lineHeight:1.5 }}>{value}</div>
    </div>
  );
}
function InfoSection({ title, children }) {
  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ fontSize:11, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:10, paddingBottom:6, borderBottom:'1px solid #f1f5f9' }}>{title}</div>
      {children}
    </div>
  );
}

function InspectorBody({ item, onOpenField, onNavigate }) {
  const resolved = resolveRef(item);
  const m = REF_META[item.type] || REF_META['INVOCA_PLATFORM'];
  const Icon = REF_ICON[item.type] || IcoPlatform;

  // Header
  const header = (
    <div style={{ padding:'20px 20px 16px', borderBottom:'1px solid #f1f5f9', background:'white' }}>
      <div style={{ display:'flex', alignItems:'flex-start', gap:10, marginBottom:8 }}>
        <div style={{ width:32, height:32, borderRadius:8, background:m.bg, display:'flex', alignItems:'center', justifyContent:'center', color:m.color, flexShrink:0 }}>
          <Icon />
        </div>
        <div>
          <div style={{ fontSize:15, fontWeight:700, color:'#0f172a', lineHeight:1.3 }}>{item.name}</div>
          <div style={{ fontSize:12, color:m.text, background:m.bg, display:'inline-block', padding:'1px 8px', borderRadius:10, marginTop:4, fontWeight:500 }}>{m.label}</div>
        </div>
      </div>
    </div>
  );

  const FieldLink = ({ f, paused, externalFieldName }) => (
    <a
      href="#"
      onClick={e => { e.preventDefault(); onOpenField && onOpenField(f); }}
      style={{ display:'flex', alignItems:'center', gap:5, fontSize:12, color: paused ? '#94a3b8' : '#3b82f6', textDecoration:'none', padding:'2px 0', lineHeight:1.5, opacity: paused ? 0.75 : 1 }}
      onMouseOver={e => e.currentTarget.style.textDecoration='underline'}
      onMouseOut={e => e.currentTarget.style.textDecoration='none'}
    >
      {paused && <span className="material-symbols-outlined" style={{ fontSize:13, color:'#f59e0b', flexShrink:0 }}>pause_circle</span>}
      <span>{f.friendlyName}</span><code style={{ fontSize:11, color:'#94a3b8', fontFamily:'monospace', marginLeft:6 }}>{f.partnerName}</code>
      {externalFieldName && (
        <span style={{ fontSize:11, color:'#64748b', background:'#f1f5f9', border:'1px solid #e2e8f0', borderRadius:4, padding:'1px 6px', fontFamily:'ui-monospace,monospace', fontWeight:500, flexShrink:0, marginLeft:4 }}>→ {externalFieldName}</span>
      )}
    </a>
  );

  // For inline field lists in inspector bodies — links to matching field if found,
  // navigates to signal if found, renders muted placeholder text otherwise.
  // Also shows external field name mapping when the inspector's consumer ref has one.
  const FieldOrText = ({ name }) => {
    const f = FIELDS_INITIAL.find(field => field.partnerName === name);
    if (f && onOpenField) {
      const consumerRef = f.consumers && f.consumers.find(c => c.id === item.id);
      return <FieldLink f={f} externalFieldName={consumerRef?.externalFieldName} />;
    }
    const sig = SIGNALS.find(s => s.name === name);
    if (sig && onNavigate) {
      const sigType = sig.type === 'AI_SIGNAL' ? 'AI_SIGNAL' : 'RULES_SIGNAL';
      return (
        <button onClick={() => onNavigate({type:sigType, id:sig.id, name:sig.name})}
          style={{ display:'flex', alignItems:'center', gap:5, fontSize:12, color:'#7c3aed', textDecoration:'none', background:'none', border:'none', cursor:'pointer', padding:'2px 0', lineHeight:1.5 }}
          onMouseOver={e => e.currentTarget.style.textDecoration='underline'}
          onMouseOut={e => e.currentTarget.style.textDecoration='none'}
        >
          <span>{name}</span><span style={{ fontSize:10, color:'#a78bfa', background:'#f5f3ff', padding:'1px 5px', borderRadius:4, fontWeight:600, marginLeft:2 }}>signal</span>
        </button>
      );
    }
    // Descriptive placeholder (e.g. "+ all call data fields", "utm_*")
    return <div style={{ fontSize:13, color:'#94a3b8', padding:'2px 0', fontStyle:'italic' }}>• {name}</div>;
  };

  const body = (() => {
    if (resolved) {
      switch (item.type) {
        case 'LOOKUP_TABLE': {
          const l = resolved;
          return (
            <div style={{ padding:20 }}>
              <InfoSection title="About">
                {l.description && <InfoRow label="Description" value={l.description} />}
                {l.warning && <div style={{ background:'#fffbeb', border:'1px solid #fde68a', borderRadius:6, padding:'8px 12px', fontSize:12, color:'#92400e', marginBottom:12 }}>⚠ {l.warning}</div>}
                <InfoRow label="Status" value={l.status} />
                <InfoRow label="Row count" value={l.rowCount?.toLocaleString()} />
                <InfoRow label="Last updated" value={l.lastUpdated} />
              </InfoSection>
            </div>
          );
        }
        case 'RULES_SIGNAL':
        case 'AI_SIGNAL': {
          const s = resolved;
          return (
            <div style={{ padding:20 }}>
              <InfoSection title="About">
                <InfoRow label="Type" value={s.signalType} />
                <InfoRow label="Description" value={s.description} />
                {s.callsPerYear && <InfoRow label="Volume" value={`~${s.callsPerYear.toLocaleString()} calls/year`} />}
                {s.tag && <InfoRow label="Signal tag" value={s.tag} />}
              </InfoSection>
              {(s.signalId || s.conversionValue) && (
                <InfoSection title="Google Ads Config">
                  {s.signalId && <InfoRow label="Signal ID" value={s.signalId} />}
                  {s.googleAdsAccount && <InfoRow label="Account" value={s.googleAdsAccount} />}
                  {s.conversionValue && <InfoRow label="Conversion value" value={s.conversionValue} />}
                  {s.conversionCategory && <InfoRow label="Category" value={s.conversionCategory} />}
                  {s.attributionModel && <InfoRow label="Attribution" value={s.attributionModel} />}
                  {s.ctcLookbackDays && <InfoRow label="CTC lookback" value={`${s.ctcLookbackDays} days`} />}
                  {s.countingType && <InfoRow label="Counting" value={s.countingType} />}
                </InfoSection>
              )}
              {s.platformActions && s.platformActions.length > 0 && (
                <InfoSection title="Platform Actions">
                  {s.platformActions.map((a,i) => (
                    <div key={i} style={{ background:'#f8fafc', border:'1px solid #e2e8f0', borderRadius:6, padding:'8px 10px', marginBottom:8 }}>
                      <div style={{ fontSize:12, fontWeight:600, color:'#374151', marginBottom:4 }}>{a.platform}</div>
                      <div style={{ fontSize:12, color:'#64748b' }}>Action: {a.action}</div>
                      {a.filter && <div style={{ fontSize:12, color:'#64748b' }}>Signal filter: <code style={{ fontFamily:'monospace', background:'#f1f5f9', padding:'0 4px', borderRadius:3 }}>{a.filter}</code></div>}
                      {a.conversionName && <div style={{ fontSize:12, color:'#64748b' }}>Conversion name: {a.conversionName}</div>}
                      {a.eventAction && <div style={{ fontSize:12, color:'#64748b' }}>Event action: {a.eventAction}</div>}
                    </div>
                  ))}
                </InfoSection>
              )}
              {s.rule && (
                <InfoSection title="Rule Logic">
                  <pre style={{ fontSize:12, background:'#f8fafc', border:'1px solid #e2e8f0', borderRadius:6, padding:'10px 12px', whiteSpace:'pre-wrap', wordBreak:'break-word', color:'#334155', margin:0 }}>{s.rule}</pre>
                </InfoSection>
              )}
              {s.consumers.length > 0 && (
                <InfoSection title="Downstream Consumers">
                  {s.consumers.map((c,i) => <div key={i} style={{ fontSize:13, color:'#374151', padding:'3px 0' }}>• {c}</div>)}
                </InfoSection>
              )}
            </div>
          );
        }
        case 'INTEGRATION':
        case 'SALESFORCE': {
          const intg = resolved;
          return (
            <div style={{ padding:20 }}>
              <InfoSection title="About">
                <InfoRow label="Platform" value={intg.platform} />
                <InfoRow label="Status" value={intg.status} />
                <InfoRow label="Description" value={intg.description} />
                {intg.account && <InfoRow label="Account ID" value={intg.account} />}
                {intg.signalCount && <InfoRow label="Signal / conversion count" value={`${intg.signalCount} actions configured`} />}
              </InfoSection>
              {intg.fieldsSent && intg.fieldsSent.length > 0 && (
                <InfoSection title="Fields / Signals Sent">
                  {intg.fieldsSent.map((f,i) => <FieldOrText key={i} name={f} />)}
                </InfoSection>
              )}
              {intg.fieldsReceived && intg.fieldsReceived.length > 0 && (
                <InfoSection title="Fields Received (Writeback)">
                  {intg.fieldsReceived.map((f,i) => <FieldOrText key={i} name={f} />)}
                </InfoSection>
              )}
            </div>
          );
        }
        case 'SMART_ALERT': {
          const a = resolved;
          const watchedSignalEl = a.watchedSignalRef && onNavigate
            ? <button onClick={() => onNavigate(a.watchedSignalRef)} style={{ background:'none', border:'none', padding:0, color:'#2563eb', fontSize:13, cursor:'pointer', textDecoration:'underline', textUnderlineOffset:2, fontWeight:500 }}>{a.watchedSignal}</button>
            : a.watchedSignal;
          return (
            <div style={{ padding:20 }}>
              <InfoSection title="About">
                <InfoRow label="Description" value={a.description} />
                <InfoRow label="Watches signal" value={watchedSignalEl} />
                <InfoRow label="Trigger threshold" value={a.threshold} />
                <InfoRow label="Window" value={a.window} />
                <InfoRow label="Active schedule" value={a.schedule} />
                {a.sfDependent && <div style={{ background:'#fff7ed', border:'1px solid #fed7aa', borderRadius:6, padding:'8px 12px', fontSize:12, color:'#9a3412' }}>Also detects Salesforce writeback failures</div>}
              </InfoSection>
            </div>
          );
        }
        case 'DATA_DELIVERY': {
          const dd = resolved;
          return (
            <div style={{ padding:20 }}>
              <InfoSection title="About">
                <InfoRow label="Platform" value={dd.platform} />
                <InfoRow label="Status" value={dd.status} />
                <InfoRow label="Description" value={dd.description} />
                <InfoRow label="Delivery mode" value={dd.deliveryMode} />
                {dd.deliveryTrigger && <InfoRow label="Delivery trigger" value={dd.deliveryTrigger} />}
                {dd.usedBy && <InfoRow label="Used by" value={dd.usedBy} />}
                {dd.notes && <div style={{ background:'#f0f9ff', border:'1px solid #bae6fd', borderRadius:6, padding:'8px 12px', fontSize:12, color:'#0369a1', marginBottom:12 }}>{dd.notes}</div>}
              </InfoSection>
              {dd.fieldsDelivered && dd.fieldsDelivered.length > 0 && (
                <InfoSection title="Fields Delivered">
                  {dd.fieldsDelivered.map((f,i) => <FieldOrText key={i} name={f} />)}
                </InfoSection>
              )}
            </div>
          );
        }
        case 'WEBHOOK': {
          const wh = resolved;
          return (
            <div style={{ padding:20 }}>
              <InfoSection title="About">
                <InfoRow label="Platform" value={wh.platform} />
                <InfoRow label="Status" value={wh.status} />
                <InfoRow label="Description" value={wh.description} />
                <InfoRow label="Delivery mode" value={wh.deliveryMode} />
                <InfoRow label="Fires on" value={wh.firesOn} />
                {wh.notes && <div style={{ background:'#fff7ed', border:'1px solid #fed7aa', borderRadius:6, padding:'8px 12px', fontSize:12, color:'#9a3412', marginBottom:12 }}>{wh.notes}</div>}
              </InfoSection>
              {wh.fieldsSent && wh.fieldsSent.length > 0 && (
                <InfoSection title="Fields Sent">
                  {wh.fieldsSent.map((f,i) => <FieldOrText key={i} name={f} />)}
                </InfoSection>
              )}
            </div>
          );
        }
        default: return null;
      }
    }

    // Unresolved types — informational panel
    switch (item.type) {
      case 'JS_TAG':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Description" value="The Invoca JavaScript tag runs on iTelecom's website and captures visitor and session context at the moment of a call — URL parameters, cookies, and data layer values." />
              <InfoRow label="Data captured" value={item.name} />
              {item.campaign
                ? <InfoRow label="Campaign" value={<span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>{item.campaign}<span style={{ fontSize:11, background:'#fef3c7', color:'#92400e', padding:'1px 7px', borderRadius:8, fontWeight:600 }}>Campaign-scoped</span></span>} />
                : <InfoRow label="Scope" value={<span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>All campaigns<span style={{ fontSize:11, background:'#f1f5f9', color:'#64748b', padding:'1px 7px', borderRadius:8, fontWeight:600 }}>Account-wide</span></span>} />
              }
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>The JS tag intercepts phone number clicks or dynamically replaces tracking numbers. At the moment of call, it writes captured values to the call record via Invoca's real-time API.{item.campaign ? ` This tag fires only for calls attributed to the ${item.campaign} campaign.` : ''}</div>
            </InfoSection>
          </div>
        );
      case 'INVOCA_PLATFORM':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Description" value="Data captured directly by Invoca's call tracking network — not dependent on any JS tag or third-party writeback." />
              <InfoRow label="Measurement" value={item.name} />
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>Invoca measures calls passing through its network infrastructure. Platform-measured fields are highly reliable but some (like duration, call direction) require specific Invoca features to be enabled.</div>
            </InfoSection>
          </div>
        );
      case 'DATA_DELIVERY':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Destination" value={item.name} />
              <InfoRow label="Description" value="An endpoint that receives iTelecom call data via Invoca's reporting API or batch export pipeline." />
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>Invoca delivers call records to this destination on a configured schedule or in near-real-time. The delivery includes all fields enabled for this destination.</div>
            </InfoSection>
          </div>
        );
      case 'CALL_TREATMENT':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Treatment" value={item.name} />
              <InfoRow label="Description" value="A call routing rule that reads field values at call time to determine where the call is routed or how it is handled." />
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>During a call, Invoca evaluates the call treatment rules in order. This field's value is read to determine the routing decision — typically which destination number or IVR tree to use.</div>
            </InfoSection>
          </div>
        );
      case 'WEBHOOK':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Endpoint" value={item.name} />
              <InfoRow label="Description" value="An HTTP callback that receives call data in real time at the end of each call, or at a configured event trigger." />
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>Invoca sends an HTTP POST to this webhook URL containing configured call data fields in JSON or form-encoded format. Used for real-time downstream system updates.</div>
            </InfoSection>
          </div>
        );
      case 'FORMULA_FIELD':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Field" value={item.name} />
              <InfoRow label="Type" value="Formula Field" />
              <InfoRow label="Description" value="A calculated field whose value is derived from other field values using an expression evaluated when the call record is finalized." />
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>Formula fields are evaluated at call record assembly time. The expression can reference other call fields, apply string or numeric transformations, and conditionally output values. Output type depends on the formula definition.</div>
            </InfoSection>
          </div>
        );
      case 'SENTIMENT':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Field" value={item.name} />
              <InfoRow label="Type" value="AI Sentiment Score" />
              <InfoRow label="Description" value="An AI-generated sentiment rating produced by Invoca's call analytics engine from transcript analysis." />
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>Invoca's AI transcription and NLU pipeline scores the call for emotional valence. Outputs a numeric score or label (Positive / Neutral / Negative). Requires AI Studio and transcription to be enabled on the account.</div>
            </InfoSection>
          </div>
        );
      case 'CAMPAIGN':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Campaign" value={item.name} />
              <InfoRow label="Type" value="Invoca Campaign" />
              <InfoRow label="Description" value="The Invoca campaign that owns the tracking number this call came through. Campaigns organize tracking numbers by product line, channel, or marketing objective." />
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>When a caller dials a tracking number, Invoca resolves it to a campaign. Campaign-level settings control call routing, signal evaluation, integrations, and which fields are exported for that call.</div>
            </InfoSection>
          </div>
        );
      case 'KEYPRESS_SIGNAL':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Signal" value={item.name} />
              <InfoRow label="Type" value="Interaction Label (Keypress)" />
              <InfoRow label="Description" value="An interaction label assigned during the IVR flow based on caller keypresses. Records which IVR branch the caller took." />
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>Invoca's IVR builder assigns interaction labels at each decision point. When a caller presses a key or says a recognized phrase, the corresponding label fires and is stored on the call record. Used for intent segmentation and routing attribution.</div>
            </InfoSection>
          </div>
        );
      case 'SEMANTIC_SIGNAL':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Signal" value={item.name} />
              <InfoRow label="Type" value="Semantic Signal (AI)" />
              <InfoRow label="Description" value="An AI-powered signal that uses semantic understanding of the call transcript to detect intent, topic, or outcome — beyond simple keyword matching." />
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>Semantic signals use LLM embeddings to match caller intent to predefined categories. Unlike keyword signals, semantic signals handle paraphrase and synonym variation without explicit rule authoring. Requires AI Studio.</div>
            </InfoSection>
          </div>
        );
      case 'KEYWORD_SIGNAL':
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Signal" value={item.name} />
              <InfoRow label="Type" value="Keyword Signal" />
              <InfoRow label="Description" value="A signal that fires when one or more specified words or phrases are detected in the call transcript." />
            </InfoSection>
            <InfoSection title="How it works">
              <div style={{ fontSize:13, color:'#374151', lineHeight:1.6 }}>Invoca transcribes the call and scans the text for exact or fuzzy keyword matches. When a match is found, the signal fires and is stored on the call record. Simpler to configure than a full AI Studio model, but less robust against paraphrase variation.</div>
            </InfoSection>
          </div>
        );
      default:
        return (
          <div style={{ padding:20 }}>
            <InfoSection title="About">
              <InfoRow label="Name" value={item.name} />
              <InfoRow label="Type" value={REF_META[item.type]?.label || item.type} />
            </InfoSection>
            <div style={{ fontSize:13, color:'#94a3b8', lineHeight:1.6, paddingTop:4 }}>
              Full configuration detail for this entity type is not represented in this prototype. In the live product this panel would show field relationships, configuration, and a link to the management UI.
            </div>
          </div>
        );
    }
  })();

  // Cross-linked fields section — each entry carries paused state for this specific connection
  const fieldWrites = FIELDS_INITIAL
    .filter(f => f.sources.some(s => s.id === item.id))
    .map(f => ({ field:f, paused: !!f.sources.find(s => s.id === item.id)?.paused }))
    .sort((a,b) => a.paused - b.paused);
  const fieldReads = FIELDS_INITIAL
    .filter(f => f.consumers.some(c => c.id === item.id))
    .map(f => ({ field:f, paused: !!f.consumers.find(c => c.id === item.id)?.paused }))
    .sort((a,b) => a.paused - b.paused);

  const writesLabel = {
    SALESFORCE: 'Fields written back by this integration',
    INTEGRATION: 'Fields written by this integration',
    LOOKUP_TABLE: 'Output fields',
    JS_TAG: 'Fields captured by this tag',
    INVOCA_PLATFORM: 'Platform-measured fields',
  }[item.type] || 'Fields this populates';

  const readsLabel = {
    RULES_SIGNAL: 'Input fields this signal depends on',
    AI_SIGNAL: 'Input fields',
    SMART_ALERT: 'Fields monitored',
    SALESFORCE: 'Fields sent to this integration',
    INTEGRATION: 'Fields read by this integration',
    LOOKUP_TABLE: 'Input (key) fields',
    DATA_DELIVERY: 'Fields delivered to this destination',
    WEBHOOK: 'Fields sent to this endpoint',
    CALL_TREATMENT: 'Fields read at routing time',
  }[item.type] || 'Fields this reads';

  const linkedSection = (fieldWrites.length > 0 || fieldReads.length > 0) ? (
    <div style={{ padding:'16px 20px 20px', borderTop:'1px solid #f1f5f9' }}>
      {item.type === 'WEBHOOK' ? (
        <>
          {fieldReads.length > 0 && (
            <InfoSection title="Fields sent">
              <div style={{ display:'flex', flexDirection:'column' }}>
                {fieldReads.map(({field:f, paused}) => <FieldLink key={f.id} f={f} paused={paused} />)}
              </div>
            </InfoSection>
          )}
          {fieldWrites.length > 0 && (
            <InfoSection title="Fields received (writeback)">
              <div style={{ display:'flex', flexDirection:'column' }}>
                {fieldWrites.map(({field:f, paused}) => <FieldLink key={f.id} f={f} paused={paused} />)}
              </div>
            </InfoSection>
          )}
        </>
      ) : (
        <>
          {fieldWrites.length > 0 && (
            <InfoSection title={writesLabel}>
              <div style={{ display:'flex', flexDirection:'column' }}>
                {fieldWrites.map(({field:f, paused}) => <FieldLink key={f.id} f={f} paused={paused} />)}
              </div>
            </InfoSection>
          )}
          {fieldReads.length > 0 && item.type !== 'SALESFORCE' && (
            <InfoSection title={readsLabel}>
              <div style={{ display:'flex', flexDirection:'column' }}>
                {fieldReads.map(({field:f, paused}) => <FieldLink key={f.id} f={f} paused={paused} />)}
              </div>
            </InfoSection>
          )}
        </>
      )}
    </div>
  ) : null;

  const configLink = (() => {
    const isStub = !resolveRef(item);
    switch (item.type) {
      case 'LOOKUP_TABLE':   return { url:'#', label:`Invoca → Lookup Tables → ${item.name}`, isStub };
      case 'RULES_SIGNAL':
      case 'AI_SIGNAL':      return { url:'#', label:`Invoca → Signal Library → ${item.name}`, isStub };
      case 'SALESFORCE':     return { url:'#', label:`Invoca → Integrations → Salesforce → ${item.name}`, isStub };
      case 'INTEGRATION':    return { url:'#', label:`Invoca → Integrations → ${item.name}`, isStub };
      case 'SMART_ALERT':    return { url:'#', label:`Invoca → Smart Alerts → ${item.name}`, isStub };
      case 'DATA_DELIVERY':  return { url:'#', label:`Invoca → Reporting → Data Delivery → ${item.name}`, isStub };
      case 'WEBHOOK':        return { url:'#', label:`Invoca → Webhooks → ${item.name}`, isStub };
      case 'CALL_TREATMENT': return { url:'#', label:`Invoca → Call Treatments → ${item.name}`, isStub: true };
      case 'JS_TAG':         return { url:'#', label:`Invoca → Tag Manager → ${item.name}`, isStub: true };
      default: return null;
    }
  })();

  const configFooter = configLink ? (
    <div style={{ padding:'12px 20px', borderTop:'1px solid #f1f5f9', marginTop:'auto' }}>
      <a href="#"
         onClick={e => { e.preventDefault(); if (configLink.isStub) alert('This object is not represented in the prototype. In the live product, this would open the corresponding Invoca configuration page.'); }}
         style={{ display:'inline-flex', alignItems:'center', gap:5, fontSize:12, color:'#3b82f6', textDecoration:'none', fontWeight:500 }}
         onMouseOver={e => e.currentTarget.style.textDecoration='underline'}
         onMouseOut={e => e.currentTarget.style.textDecoration='none'}>
        <span className="material-symbols-outlined" style={{ fontSize:13 }}>open_in_new</span>
        {configLink.label}
      </a>
    </div>
  ) : null;

  return <>{header}{body}{linkedSection}{configFooter}</>;
}

// ─────────────────────────────────────────────
// 8. INSPECTOR DRAWER
// ─────────────────────────────────────────────

function Inspector({ inspector, onClose, onOpenField }) {
  const [visible, setVisible] = useState(false);
  const [animOut, setAnimOut] = useState(false);
  const [current, setCurrent] = useState(null);

  useEffect(() => {
    if (inspector) { setCurrent(inspector); setAnimOut(false); setVisible(true); }
    else if (visible) {
      setAnimOut(true);
      const t = setTimeout(() => { setVisible(false); setAnimOut(false); }, 180);
      return () => clearTimeout(t);
    }
  }, [inspector]);

  if (!visible || !current) return null;
  return (
    <>
      <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.25)', zIndex:300 }} className="backdrop-enter" />
      <div className={animOut ? 'inspector-exit' : 'inspector-enter'} style={{ position:'fixed', top:0, right:0, bottom:0, width:400, background:'white', zIndex:301, overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'-4px 0 24px rgba(0,0,0,.15)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 16px', height:48, borderBottom:'1px solid #f1f5f9', background:'#fafbfc', flexShrink:0 }}>
          <span style={{ fontSize:12, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.05em' }}>Inspector</span>
          <button onClick={onClose} style={{ width:28, height:28, borderRadius:6, background:'none', border:'1px solid #e2e8f0', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'#64748b' }}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
          </button>
        </div>
        <div style={{ overflowY:'auto', flex:1 }}>
          <InspectorBody item={current} onOpenField={onOpenField} onNavigate={setCurrent} />
        </div>
      </div>
    </>
  );
}

// ─────────────────────────────────────────────
// 9. FIELD DETAIL VIEW
// ─────────────────────────────────────────────

function FieldDetail({ field, onBack, onInspect, onUpdateField, customApiNames, allFields, onOpenField }) {
  const clobbered = !field.isCustom && customApiNames && customApiNames.has(field.partnerName);
  const [aliasInput, setAliasInput] = useState('');
  const [showAliasInput, setShowAliasInput] = useState(false);
  const [showPausedCons, setShowPausedCons] = useState(false);
  const [showPausedSrcs, setShowPausedSrcs] = useState(false);
  const aliases = field.aliases || [];

  const [editingName, setEditingName] = useState(false);
  const [nameVal, setNameVal] = useState(field.friendlyName);
  const [editingDesc, setEditingDesc] = useState(false);
  const [descVal, setDescVal] = useState(field.description);
  const [showTagInput, setShowTagInput] = useState(false);
  const [tagInput, setTagInput] = useState('');

  const removeTag = tag => {
    const updated = { ...field, tags: field.tags.filter(t => t !== tag) };
    onUpdateField && onUpdateField(updated);
  };
  const addTag = () => {
    const t = tagInput.trim().toLowerCase().replace(/\s+/g, '-');
    if (!t || field.tags.includes(t)) { setTagInput(''); setShowTagInput(false); return; }
    const updated = { ...field, tags: [...field.tags, t] };
    onUpdateField && onUpdateField(updated);
    setTagInput(''); setShowTagInput(false);
  };

  // Reset local edit state when navigating to a different field
  useEffect(() => {
    setNameVal(field.friendlyName);
    setDescVal(field.description);
    setEditingName(false);
    setEditingDesc(false);
  }, [field.id]);

  const saveName = () => {
    const v = nameVal.trim();
    if (v && v !== field.friendlyName) onUpdateField({ ...field, friendlyName: v });
    setEditingName(false);
  };
  const saveDesc = () => {
    const v = descVal.trim();
    if (v !== field.description) onUpdateField({ ...field, description: v });
    setEditingDesc(false);
  };

  const addAlias = () => {
    const trimmed = aliasInput.trim();
    if (!trimmed || aliases.includes(trimmed)) return;
    onUpdateField({ ...field, aliases: [...aliases, trimmed] });
    setAliasInput('');
    setShowAliasInput(false);
  };
  const removeAlias = a => onUpdateField({ ...field, aliases: aliases.filter(x => x !== a) });

  return (
    <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden' }}>
      {/* Page header — matches list view header bar */}
      <div style={{ background:'white', borderBottom:'1px solid #e2e8f0', padding:'12px 20px', display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
        <button onClick={onBack} style={{ display:'flex', alignItems:'center', gap:4, color:'#64748b', background:'none', border:'1px solid #e2e8f0', cursor:'pointer', fontSize:13, fontWeight:500, padding:'4px 10px 4px 6px', borderRadius:6 }}
          onMouseOver={e=>e.currentTarget.style.background='#f8fafc'} onMouseOut={e=>e.currentTarget.style.background='none'}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
          Back
        </button>
        <h1 style={{ fontSize:18, fontWeight:700, color:'#0f172a', margin:0 }}>{nameVal || field.friendlyName}</h1>
        {field.isHidden && <HiddenBadge />}
      </div>

      {/* Scrollable content */}
      <div style={{ flex:1, overflowY:'auto', padding:20 }}>

      {/* Field header */}
      <div style={{ background:'white', border:'1px solid #e2e8f0', borderRadius:12, padding:24, marginBottom:20 }}>
        <div style={{ marginBottom:16 }}>
          <div>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
              {editingName
                ? <span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
                    <input
                      value={nameVal}
                      onChange={e => setNameVal(e.target.value)}
                      autoFocus
                      onKeyDown={e => { if (e.key === 'Enter') saveName(); if (e.key === 'Escape') { setNameVal(field.friendlyName); setEditingName(false); } }}
                      style={{ fontSize:20, fontWeight:700, color:'#0f172a', border:'none', borderBottom:'2px solid #3b82f6', outline:'none', background:'transparent', padding:'0 0 2px 0', minWidth:220 }}
                    />
                    <button onClick={saveName} style={{ fontSize:11, color:'white', background:'#3b82f6', border:'none', borderRadius:5, padding:'3px 10px', cursor:'pointer', fontWeight:600 }}>Save</button>
                    <button onClick={() => { setNameVal(field.friendlyName); setEditingName(false); }} style={{ fontSize:11, color:'#64748b', background:'none', border:'none', cursor:'pointer' }}>Cancel</button>
                  </span>
                : <span style={{ display:'inline-flex', alignItems:'center', gap:5, cursor:'text' }} onClick={() => setEditingName(true)} title="Click to edit">
                    <h1 style={{ fontSize:20, fontWeight:700, color:'#0f172a', margin:0 }}>{field.friendlyName}</h1>
                    <span className="material-symbols-outlined" style={{ fontSize:14, color:'#cbd5e1', userSelect:'none' }}>edit</span>
                  </span>
              }
              {field.isHidden && <HiddenBadge />}
              {field.entitledNotInUse && <NotInUseBadge feature={field.entitledNotInUse} />}
              {field.confusionNotice && <span title={field.confusionNotice.message} style={{ color:'#f59e0b', fontSize:16 }}>⚠</span>}
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
              <code style={{ fontSize:13, background:'#f1f5f9', color:'#334155', padding:'2px 8px', borderRadius:6, fontFamily:'monospace' }}>{field.partnerName}</code>
              {clobbered && field.universalName && <code style={{ fontSize:13, background:'#f0fdf4', color:'#166534', padding:'2px 8px', borderRadius:6, fontFamily:'monospace' }}>{field.universalName}</code>}
              {aliases.map(a => (
                <span key={a} style={{ display:'inline-flex', alignItems:'center', gap:3, fontSize:12, fontFamily:'monospace', background:'#f1f5f9', color:'#475569', padding:'2px 6px 2px 8px', borderRadius:6 }}>
                  {a}
                  <button onClick={() => removeAlias(a)} style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', fontSize:13, lineHeight:1, padding:'0 0 0 1px', display:'flex', alignItems:'center' }}>×</button>
                </span>
              ))}
              {showAliasInput
                ? <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
                    <input
                      value={aliasInput}
                      onChange={e => setAliasInput(e.target.value)}
                      placeholder="alias_name"
                      autoFocus
                      onKeyDown={e => { if (e.key === 'Enter') addAlias(); if (e.key === 'Escape') { setShowAliasInput(false); setAliasInput(''); } }}
                      style={{ fontSize:12, fontFamily:'monospace', padding:'2px 6px', border:'1px solid #cbd5e1', borderRadius:6, outline:'none', width:140 }}
                    />
                    <button onClick={addAlias} style={{ fontSize:11, color:'white', background:'#3b82f6', border:'none', borderRadius:5, padding:'3px 8px', cursor:'pointer', fontWeight:600 }}>Add</button>
                    <button onClick={() => { setShowAliasInput(false); setAliasInput(''); }} style={{ fontSize:11, color:'#64748b', background:'none', border:'none', cursor:'pointer' }}>Cancel</button>
                  </span>
                : <button onClick={() => setShowAliasInput(true)} style={{ fontSize:11, color:'#64748b', background:'none', border:'1px dashed #cbd5e1', borderRadius:5, padding:'2px 8px', cursor:'pointer' }}>+ alias</button>
              }
            </div>
          </div>
        </div>
        {/* System metadata row */}
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:10, flexWrap:'wrap' }}>
          <span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
            <span style={{ fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.06em' }}>Type</span>
            <TypeBadge type={field.type} />
          </span>
          <span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
            <span style={{ fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.06em' }}>Object</span>
            <span style={{ fontSize:12, background:'#e0e7ff', color:'#3730a3', padding:'2px 8px', borderRadius:10, fontWeight:500 }}>{field.objectType}</span>
          </span>
          {field.isCustom && <span style={{ fontSize:11, background:'#f1f5f9', color:'#64748b', padding:'2px 7px', borderRadius:10, fontWeight:600 }}>Custom</span>}
        </div>
        {/* User tags row — editable */}
        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:16, flexWrap:'wrap' }}>
          <span style={{ fontSize:10, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.06em', flexShrink:0, marginRight:2 }}>Tags</span>
          {field.tags.map(t => (
            <span key={t} style={{ display:'inline-flex', alignItems:'center', gap:3, fontSize:12, background:'#f0fdf4', color:'#166534', padding:'2px 6px 2px 10px', borderRadius:10, fontWeight:500 }}>
              {t}
              <button onClick={() => removeTag(t)} title={`Remove tag "${t}"`} style={{ background:'none', border:'none', cursor:'pointer', color:'#94a3b8', padding:'0 2px', fontSize:14, lineHeight:1, display:'flex', alignItems:'center' }} onMouseOver={e=>e.currentTarget.style.color='#dc2626'} onMouseOut={e=>e.currentTarget.style.color='#94a3b8'}>×</button>
            </span>
          ))}
          {field.tags.length === 0 && !showTagInput && <span style={{ fontSize:12, color:'#cbd5e1', fontStyle:'italic' }}>no tags</span>}
          {showTagInput
            ? <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
                <input value={tagInput} onChange={e => setTagInput(e.target.value)} autoFocus placeholder="tag name"
                  onKeyDown={e => { if (e.key === 'Enter') addTag(); if (e.key === 'Escape') { setShowTagInput(false); setTagInput(''); } }}
                  style={{ fontSize:12, padding:'2px 8px', border:'1px solid #3b82f6', borderRadius:8, outline:'none', width:110, fontFamily:'inherit' }}
                />
                <button onClick={addTag} style={{ fontSize:11, color:'white', background:'#3b82f6', border:'none', borderRadius:6, padding:'3px 9px', cursor:'pointer', fontWeight:600 }}>Add</button>
                <button onClick={() => { setShowTagInput(false); setTagInput(''); }} style={{ fontSize:11, color:'#64748b', background:'none', border:'none', cursor:'pointer' }}>Cancel</button>
              </span>
            : <button onClick={() => setShowTagInput(true)} style={{ fontSize:11, color:'#64748b', background:'none', border:'1px dashed #cbd5e1', borderRadius:8, padding:'2px 9px', cursor:'pointer' }}>+ tag</button>
          }
        </div>
        {editingDesc
          ? <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              <textarea
                value={descVal}
                onChange={e => setDescVal(e.target.value)}
                autoFocus
                rows={4}
                onKeyDown={e => { if (e.key === 'Escape') { setDescVal(field.description); setEditingDesc(false); } }}
                style={{ fontSize:14, color:'#475569', lineHeight:1.7, border:'1px solid #3b82f6', borderRadius:6, outline:'none', padding:'6px 10px', resize:'vertical', width:'100%', fontFamily:'inherit', boxSizing:'border-box' }}
              />
              <div style={{ display:'flex', gap:6 }}>
                <button onClick={saveDesc} style={{ fontSize:11, color:'white', background:'#3b82f6', border:'none', borderRadius:5, padding:'4px 12px', cursor:'pointer', fontWeight:600 }}>Save</button>
                <button onClick={() => { setDescVal(field.description); setEditingDesc(false); }} style={{ fontSize:11, color:'#64748b', background:'none', border:'none', cursor:'pointer' }}>Cancel</button>
              </div>
            </div>
          : <p style={{ fontSize:14, color:'#475569', margin:0, lineHeight:1.7, cursor:'text' }} onClick={() => setEditingDesc(true)} title="Click to edit">
              {field.description}
              <span className="material-symbols-outlined" style={{ fontSize:14, color:'#cbd5e1', marginLeft:6, verticalAlign:'middle', userSelect:'none' }}>edit</span>
            </p>
        }
      </div>

      {/* Entitled but not activated notice */}
      {field.entitledNotInUse && (
        <div style={{ background:'#fff7ed', border:'1px solid #fed7aa', borderRadius:8, padding:16, marginBottom:16, display:'flex', gap:12 }}>
          <span style={{ fontSize:18, flexShrink:0 }}>🔒</span>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:'#9a3412', marginBottom:4 }}>Capability not activated</div>
            <div style={{ fontSize:13, color:'#7c2d12', lineHeight:1.6 }}>
              This field is part of <strong>{field.entitledNotInUse}</strong>, an Invoca capability that iTelecom is entitled to but has not activated. The field exists in the schema and will appear in exports, but has never held data.
            </div>
          </div>
        </div>
      )}

      {/* Conflict notice */}
      {field.confusionNotice && (
        <div style={{ background:'#fffbeb', border:'1px solid #fde68a', borderRadius:8, padding:16, marginBottom:20, display:'flex', gap:12 }}>
          <span style={{ fontSize:18, flexShrink:0 }}>⚠</span>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:'#92400e', marginBottom:4 }}>Naming conflict</div>
            <div style={{ fontSize:13, color:'#78350f', lineHeight:1.6, display:'flex', alignItems:'center', flexWrap:'wrap', gap:6 }}>
              <span>{field.confusionNotice.message}</span>
              {field.confusionNotice.relatedPartnerName && (() => {
                const related = allFields && allFields.find(f => f.partnerName === field.confusionNotice.relatedPartnerName && f.id !== field.id);
                return related && onOpenField
                  ? <button onClick={() => onOpenField(related)} style={{ fontSize:12, fontFamily:'monospace', background:'rgba(0,0,0,.06)', color:'#92400e', border:'1px solid #fde68a', borderRadius:4, padding:'1px 8px', cursor:'pointer', textDecoration:'underline', textDecorationStyle:'dotted' }}>{related.partnerName}</button>
                  : <code style={{ fontSize:12, background:'rgba(0,0,0,.06)', padding:'1px 6px', borderRadius:4, fontFamily:'monospace' }}>{field.confusionNotice.relatedPartnerName}</code>;
              })()}
            </div>
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:20 }}>
        {/* Depends On */}
        <div style={{ background:'white', border:'1px solid #e2e8f0', borderRadius:12, padding:20 }}>
          <div style={{ fontSize:11, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:12 }}>Depends On</div>
          {field.sources.length === 0
            ? <div style={{ fontSize:13, color:'#cbd5e1' }}>No recorded dependencies</div>
            : (() => {
                const activeSrcs = field.sources.filter(s => !s.paused);
                const pausedSrcs = field.sources.filter(s => s.paused);
                return (
                  <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                    {activeSrcs.map((s,i) => <RefTag key={i} item={s} onClick={onInspect} />)}
                    {pausedSrcs.length > 0 && showPausedSrcs && (
                      <div style={{ marginTop:4 }}>
                        {pausedSrcs.map((s,i) => <RefTag key={i} item={s} onClick={onInspect} />)}
                        <div style={{ fontSize:11, color:'#94a3b8', marginTop:6 }}>Paused — currently inactive.</div>
                      </div>
                    )}
                    {pausedSrcs.length > 0 && (
                      <button onClick={() => setShowPausedSrcs(v => !v)}
                        style={{ marginTop:4, fontSize:11, color:'#6366f1', background:'none', border:'none', cursor:'pointer', textAlign:'left', padding:0 }}>
                        {showPausedSrcs ? 'Hide paused' : `+ ${pausedSrcs.length} paused`}
                      </button>
                    )}
                  </div>
                );
              })()
          }
        </div>

        {/* Contributes To */}
        <div style={{ background:'white', border:'1px solid #e2e8f0', borderRadius:12, padding:20 }}>
          <div style={{ fontSize:11, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:12 }}>Contributes To</div>
          {(() => {
            const activeCons = field.consumers.filter(c => !c.paused);
            const pausedCons = field.consumers.filter(c => c.paused);
            const visibleCons = showPausedCons ? field.consumers : activeCons;
            if (field.consumers.length === 0) {
              return <div style={{ fontSize:13, color:'#cbd5e1' }}>No recorded consumers</div>;
            }
            return (
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {activeCons.map((c,i) => {
                  const signal = (c.type === 'RULES_SIGNAL' || c.type === 'AI_SIGNAL') ? SIGNALS.find(s => s.id === c.id) : null;
                  return (
                    <div key={i}>
                      <RefTag item={c} onClick={onInspect} showMapping />
                      {signal?.rule && (
                        <pre style={{ fontSize:11, background:'#f8fafc', border:'1px solid #e2e8f0', borderRadius:4, padding:'6px 10px', margin:'4px 0 2px 22px', whiteSpace:'pre-wrap', wordBreak:'break-word', color:'#334155', lineHeight:1.5 }}>{signal.rule}</pre>
                      )}
                    </div>
                  );
                })}
                {pausedCons.length > 0 && showPausedCons && (
                  <div style={{ marginTop:4 }}>
                    {pausedCons.map((c,i) => <RefTag key={i} item={c} onClick={onInspect} showMapping />)}
                    <div style={{ fontSize:11, color:'#94a3b8', marginTop:6 }}>Paused — currently inactive.</div>
                  </div>
                )}
                {pausedCons.length > 0 && (
                  <button onClick={() => setShowPausedCons(v => !v)}
                    style={{ marginTop:4, fontSize:11, color:'#6366f1', background:'none', border:'none', cursor:'pointer', textAlign:'left', padding:0 }}>
                    {showPausedCons ? `Hide paused` : `+ ${pausedCons.length} paused`}
                  </button>
                )}
              </div>
            );
          })()}
        </div>
      </div>

      {/* Allowed values */}
      {field.allowedValues && (
        <div style={{ background:'white', border:'1px solid #e2e8f0', borderRadius:12, padding:20 }}>
          <div style={{ fontSize:11, fontWeight:700, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:12 }}>Allowed Values</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>

        </div>
      )}

      </div>{/* end scrollable content */}
    </div>
  );
}

function Highlight({ text, query }) {
  if (!query || !text) return <>{text}</>;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const parts = text.split(new RegExp(`(${escaped})`, 'gi'));
  return <>{parts.map((part, i) =>
    part.toLowerCase() === query.toLowerCase()
      ? <mark key={i} style={{ background:'#fef08a', color:'inherit', padding:0, borderRadius:2 }}>{part}</mark>
      : part
  )}</>;
}

function FieldRow({ field, isSelected, onToggleSelect, onClick, onInspect, customApiNames, showDesc, search }) {
  const clobbered = !field.isCustom && customApiNames && customApiNames.has(field.partnerName);
  const hasConflict = field.confusionNotice && field.confusionNotice.level === 'warning';
  return (
    <tr className={`field-row${isSelected?' selected-row':''}${field.isHidden?' hidden-row':''}`}
      style={{ borderLeft: hasConflict ? '3px solid #f59e0b' : '3px solid transparent', cursor:'pointer' }}>
      {/* Checkbox */}
      <td style={{ padding:'10px 8px 0 12px', width:32, verticalAlign:'top' }} onClick={e => { e.stopPropagation(); onToggleSelect(field.id); }}>
        <div style={{ width:15, height:15, border:`1.5px solid ${isSelected?'#3b82f6':'#cbd5e1'}`, borderRadius:3, background:isSelected?'#3b82f6':'white', display:'flex', alignItems:'center', justifyContent:'center' }}>
          {isSelected && <svg width="9" height="7" viewBox="0 0 9 7"><path d="M1 3.5L3.3 5.8L8 1" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/></svg>}
        </div>
      </td>
      {/* Field name */}
      <td style={{ padding:'10px 12px', verticalAlign:'top' }} onClick={() => onClick(field)}>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <span style={{ fontSize:13, fontWeight:600, color:'#1e293b' }}><Highlight text={field.friendlyName} query={search} /></span>
          {field.isHidden && <HiddenBadge />}
          {field.entitledNotInUse && <NotInUseBadge feature={field.entitledNotInUse} />}
          {hasConflict && <span title={field.confusionNotice.message} style={{ color:'#f59e0b', fontSize:12 }}>⚠</span>}

        )}
      </td>
      {/* Object */}
      <td style={{ padding:'10px 8px', verticalAlign:'top' }} onClick={() => onClick(field)}>
        <span style={{ fontSize:11, background:'#e0e7ff', color:'#3730a3', padding:'2px 7px', borderRadius:8, fontWeight:500 }}>{field.objectType}</span>
      </td>

    else if (!/^[a-z][a-z0-9_]*$/.test(apiName)) errs.apiName = 'Lowercase letters, numbers, underscores only';
    return errs;

            <div>
              <label style={labelStyle}>Tags</label>

                {availableTags.map(t => (
                  <button key={t} onClick={() => toggleTag(t)}

            Cancel
