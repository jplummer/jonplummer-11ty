            onMouseOver={e=>e.currentTarget.style.background='#00a86e'} onMouseOut={e=>e.currentTarget.style.background='#00b87a'}>
            Create field
          </button>
        </div>

      </div>
    </div>
  );
}

function App() {
  const [fields, setFields] = useState(FIELDS_INITIAL);
  const [view, setView] = useState('list');

  // Dismiss loading screen once App mounts
  useEffect(() => {
    const ld = document.getElementById('loading');
    if (ld) { ld.style.opacity = '0'; setTimeout(() => ld.remove(), 260); }
  }, []);
  const [selectedField, setSelectedField] = useState(null);
  const [inspector, setInspector] = useState(null);
  const [ddTab, setDdTab] = useState('fields');
  const [lutStatusFilter, setLutStatusFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [objectFilter, setObjectFilter] = useState('All');
  const [showHidden, setShowHidden] = useState(false);
  const [showDesc, setShowDesc] = useState(false);
  const [typeFilter, setTypeFilter] = useState([]);
  const [tagFilter, setTagFilter] = useState([]);
  const [depTypeFilter, setDepTypeFilter] = useState([]);
  const [conTypeFilter, setConTypeFilter] = useState([]);
  const [customFilter, setCustomFilter] = useState('all');
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [showNewField, setShowNewField] = useState(false);

  // Filter options derived from data
  const allTypes = useMemo(() => [...new Set(FIELDS_INITIAL.map(f => f.type))].sort(), []);
  const allTags = useMemo(() => [...new Set(FIELDS_INITIAL.flatMap(f => f.tags))].sort(), []);
  const allDepTypes = useMemo(() => [...new Set(FIELDS_INITIAL.flatMap(f => f.sources.map(s => s.type)))].sort(), []);
  const allConTypes = useMemo(() => [...new Set(FIELDS_INITIAL.flatMap(f => f.consumers.map(c => c.type)))].sort(), []);
  const customApiNames = useMemo(() => new Set(fields.filter(f => f.isCustom).map(f => f.partnerName)), [fields]);

  const filtered = useMemo(() => {
    return fields.filter(f => {
      if (!showHidden && f.isHidden) return false;
      if (objectFilter !== 'All' && f.objectType !== objectFilter) return false;
      if (customFilter === 'custom' && !f.isCustom) return false;
      if (customFilter === 'builtin' && f.isCustom) return false;
      if (customFilter === 'notinuse' && !f.entitledNotInUse) return false;
      if (typeFilter.length > 0 && !typeFilter.includes(f.type)) return false;
      if (tagFilter.length > 0 && !tagFilter.some(t => f.tags.includes(t))) return false;
      if (depTypeFilter.length > 0 && !f.sources.some(s => depTypeFilter.includes(s.type))) return false;
      if (conTypeFilter.length > 0 && !f.consumers.some(c => conTypeFilter.includes(c.type))) return false;
      if (search) {
        const q = search.toLowerCase();
        return f.friendlyName.toLowerCase().includes(q) || f.partnerName.toLowerCase().includes(q) || (f.universalName && f.universalName.toLowerCase().includes(q)) || f.description.toLowerCase().includes(q);
      }
      return true;
    });
  }, [fields, search, objectFilter, customFilter, showHidden, typeFilter, tagFilter, depTypeFilter, conTypeFilter]);

  // How many hidden fields would match the same filters if showHidden were on
  const hiddenMatchCount = useMemo(() => {
    if (showHidden) return 0; // already showing hidden, no point
    return fields.filter(f => {
      if (!f.isHidden) return false; // only count hidden ones
      if (objectFilter !== 'All' && f.objectType !== objectFilter) return false;
      if (customFilter === 'custom' && !f.isCustom) return false;
      if (customFilter === 'builtin' && f.isCustom) return false;
      if (customFilter === 'notinuse' && !f.entitledNotInUse) return false;
      if (typeFilter.length > 0 && !typeFilter.includes(f.type)) return false;
      if (tagFilter.length > 0 && !tagFilter.some(t => f.tags.includes(t))) return false;
      if (depTypeFilter.length > 0 && !f.sources.some(s => depTypeFilter.includes(s.type))) return false;
      if (conTypeFilter.length > 0 && !f.consumers.some(c => conTypeFilter.includes(c.type))) return false;
      if (search) {
        const q = search.toLowerCase();
        return f.friendlyName.toLowerCase().includes(q) || f.partnerName.toLowerCase().includes(q) || (f.universalName && f.universalName.toLowerCase().includes(q)) || f.description.toLowerCase().includes(q);
      }
      return true;
    }).length;
  }, [fields, search, objectFilter, customFilter, showHidden, typeFilter, tagFilter, depTypeFilter, conTypeFilter]);

  const selCount = selectedIds.size;

  const toggleSelect = useCallback(id => {
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }, []);

  const toggleSelectAll = () => {
    if (selCount === filtered.length) setSelectedIds(new Set());
    else setSelectedIds(new Set(filtered.map(f => f.id)));
  };

  const bulkShow = () => {
    setFields(prev => prev.map(f => selectedIds.has(f.id) ? {...f, isHidden:false} : f));
    setSelectedIds(new Set());
  };
  const bulkHide = () => {
    setFields(prev => prev.map(f => selectedIds.has(f.id) ? {...f, isHidden:true} : f));
    setSelectedIds(new Set());
  };
  const [bulkTagInput, setBulkTagInput] = useState('');
  const [showBulkTag, setShowBulkTag] = useState(false);
  const bulkAddTag = () => {
    const t = bulkTagInput.trim().toLowerCase().replace(/\s+/g, '-');
    if (!t) return;
    setFields(prev => prev.map(f => selectedIds.has(f.id) ? {...f, tags: f.tags.includes(t) ? f.tags : [...f.tags, t]} : f));
    setBulkTagInput(''); setShowBulkTag(false); setSelectedIds(new Set());
  };
  const bulkRemoveTag = tag => {
    setFields(prev => prev.map(f => selectedIds.has(f.id) ? {...f, tags: f.tags.filter(t => t !== tag)} : f));
    setSelectedIds(new Set());
  };
  const bulkTagsInCommon = selCount > 0
    ? [...fields.filter(f => selectedIds.has(f.id)).reduce((acc, f, i) => {
        if (i === 0) return new Set(f.tags);
        return new Set([...acc].filter(t => f.tags.includes(t)));
      }, new Set())]
    : [];

  const openField = f => { setSelectedField(f); setView('detail'); };
  const goBack = () => { setView('list'); setSelectedField(null); };
  const updateField = updated => {
    setFields(prev => prev.map(f => f.id === updated.id ? updated : f));
    setSelectedField(updated);
  };

  const activeFilterCount = typeFilter.length + tagFilter.length + depTypeFilter.length + conTypeFilter.length + (objectFilter !== 'All' ? 1 : 0) + (customFilter !== 'all' ? 1 : 0);
  const clearFilters = () => { setTypeFilter([]); setTagFilter([]); setDepTypeFilter([]); setConTypeFilter([]); setObjectFilter('All'); setCustomFilter('all'); };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
      <TopBar onBack={goBack} crumbField={view === 'detail' ? selectedField?.friendlyName : null} />
      <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
        <LeftNav />
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>

      {view === 'list' && (
        <>
          {/* Page title + tabs */}
          <div style={{ background:'white', borderBottom:'1px solid #e2e8f0', padding:'0 20px', display:'flex', alignItems:'stretch', justifyContent:'space-between', flexShrink:0 }}>
            <div style={{ display:'flex', alignItems:'stretch', gap:0 }}>
              <h1 style={{ fontSize:18, fontWeight:700, color:'#0f172a', margin:0, display:'flex', alignItems:'center', padding:'12px 0' }}>Data Dictionary</h1>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              {ddTab === 'fields' && <button onClick={() => setShowNewField(true)} style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 14px', borderRadius:7, background:'#00b87a', color:'white', border:'none', cursor:'pointer', fontSize:13, fontWeight:600 }}
                onMouseOver={e=>e.currentTarget.style.background='#00a86e'} onMouseOut={e=>e.currentTarget.style.background='#00b87a'}>
                <span className="material-symbols-outlined" style={{ fontSize:15 }}>add</span>
                New Field
              </button>}
              <button style={{ width:32, height:32, borderRadius:7, border:'1px solid #e2e8f0', background:'white', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'#64748b', transition:'all .12s' }}
                onMouseOver={e=>{e.currentTarget.style.background='#f8fafc';e.currentTarget.style.color='#334155';}} onMouseOut={e=>{e.currentTarget.style.background='white';e.currentTarget.style.color='#64748b';}}>
                <span className="material-symbols-outlined" style={{ fontSize:18 }}>more_horiz</span>
              </button>
            </div>
          </div>
          {ddTab === 'luts' && (
            <div style={{ flex:1, overflowY:'auto', padding:20 }}>
              {/* LUT search/filter bar */}
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
                <div style={{ display:'flex', borderRadius:6, border:'1px solid #e2e8f0', overflow:'hidden', fontSize:12 }}>
                  {[['all','All'],['active','Active'],['review','Needs review']].map(([val,lbl]) => (
                    <button key={val} onClick={() => setLutStatusFilter(val)} style={{ padding:'5px 11px', background:lutStatusFilter===val?'#1a2035':'white', color:lutStatusFilter===val?'white':'#475569', border:'none', cursor:'pointer', fontWeight:500, fontSize:12 }}>{lbl}</button>
                  ))}
                </div>
                <span style={{ fontSize:12, color:'#94a3b8', marginLeft:'auto' }}>
                  {LUTS.filter(l => lutStatusFilter==='all' || l.status===lutStatusFilter).length} of {LUTS.length} lookup tables
                </span>
              </div>
              {/* LUT grid */}
              <div style={{ width:'100%', fontSize:13 }}>
                {/* Header row */}
                <div style={{ display:'grid', gridTemplateColumns:'1fr 180px 200px 68px 90px 100px', background:'#f8fafc', borderBottom:'2px solid #e2e8f0', padding:'0 16px 0 16px' }}>
                  {['Table Name','Key Field(s)','Output Fields','Rows','Updated','Status'].map((h,i) => (
                    <div key={h} style={{ padding:'8px 8px', fontWeight:600, fontSize:11, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.04em', textAlign: h==='Rows' ? 'right' : 'left', paddingLeft: i===0 ? 0 : 8 }}>{h}</div>
                  ))}
                </div>
                {/* Data rows */}
                {LUTS.filter(l => lutStatusFilter==='all' || l.status===lutStatusFilter).map((lut, i) => (
                  <div key={lut.id}
                    onClick={() => setInspector({ type:'LOOKUP_TABLE', id:lut.id, name:lut.name })}
                    onMouseOver={e=>e.currentTarget.style.background='#f1f5f9'}
                    onMouseOut={e=>e.currentTarget.style.background=i%2===1?'#f9fafb':'white'}
                    style={{ display:'grid', gridTemplateColumns:'1fr 180px 200px 68px 90px 100px', background: i%2===1 ? '#f9fafb' : 'white', borderBottom:'1px solid #f1f5f9', cursor:'pointer', padding:'0 16px', alignItems:'start', transition:'background 0.1s' }}>
                    {/* Name */}
                    <div style={{ padding:'10px 0' }}>
                      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                        <span className="material-symbols-outlined" style={{ fontSize:16, color:'#3b82f6', flexShrink:0 }}>table</span>
                        <div>
                          <div style={{ fontWeight:600, color:'#0f172a' }}>{lut.name}</div>
                          {lut.warning && <div style={{ fontSize:11, color:'#f59e0b', marginTop:2, display:'flex', alignItems:'center', gap:4 }}>
                            <span className="material-symbols-outlined" style={{ fontSize:12 }}>warning</span>{lut.warning}
                          </div>}
                        </div>
                      </div>
                    </div>
                    {/* Key fields */}
                    <div style={{ padding:'10px 8px', display:'flex', flexWrap:'wrap', gap:4, alignContent:'start' }}>
                      {lut.keyFields.map(k => <code key={k} style={{ fontSize:11, background:'#f1f5f9', color:'#475569', padding:'1px 6px', borderRadius:4 }}>{k}</code>)}
                    </div>
                    {/* Output fields */}
                    <div style={{ padding:'10px 8px', display:'flex', flexWrap:'wrap', gap:4, alignContent:'start' }}>
                      {lut.outputFields.map(o => <code key={o} style={{ fontSize:11, background:'#f0fdf4', color:'#166534', padding:'1px 6px', borderRadius:4 }}>{o}</code>)}
                    </div>
                    {/* Row count */}
                    <div style={{ padding:'10px 8px', textAlign:'right', color:'#475569', fontVariantNumeric:'tabular-nums' }}>{lut.rowCount.toLocaleString()}</div>
                    {/* Updated */}
                    <div style={{ padding:'10px 8px', color:'#64748b', whiteSpace:'nowrap' }}>{lut.lastUpdated}</div>
                    {/* Status */}
                    <div style={{ padding:'10px 8px' }}>
                      <span style={{ fontSize:11, padding:'2px 8px', borderRadius:10, fontWeight:600,
                        background: lut.status==='active' ? '#f0fdf4' : '#fef9c3',
                        color:       lut.status==='active' ? '#166534' : '#854d0e' }}>
                        {lut.status==='active' ? 'Active' : 'Needs review'}
                      </span>
                    </div>
                  </div>
                ))}
                {/* Bottom border */}
                <div style={{ borderBottom:'1px solid #e2e8f0' }} />
              </div>
            </div>
          )}

          {ddTab === 'fields' && <>
          {/* Filter bar */}
          <div style={{ background:'white', borderBottom:'1px solid #e2e8f0', padding:'10px 20px 8px', display:'flex', flexDirection:'column', gap:8, flexShrink:0 }}>
            {/* Row 1: Search */}
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ position:'relative', flex:'1 1 auto' }}>
                <svg style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', opacity:.4, pointerEvents:'none' }} width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#64748b" strokeWidth="1.4"/><path d="M10 10L13 13" stroke="#64748b" strokeWidth="1.4" strokeLinecap="round"/></svg>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search fields…" style={{ width:'100%', padding:`6px ${search?'30px':'10px'} 6px 30px`, border:'1px solid #e2e8f0', borderRadius:6, fontSize:13, color:'#334155', outline:'none', boxSizing:'border-box' }}
                  onFocus={e=>e.target.style.borderColor='#3b82f6'} onBlur={e=>e.target.style.borderColor='#e2e8f0'} />
                {search && (
                  <button onClick={() => setSearch('')} style={{ position:'absolute', right:7, top:'50%', transform:'translateY(-50%)', width:18, height:18, borderRadius:'50%', background:'#94a3b8', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', padding:0, lineHeight:0 }}>
                    <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1.5 1.5L6.5 6.5M6.5 1.5L1.5 6.5" stroke="white" strokeWidth="1.4" strokeLinecap="round"/></svg>
                  </button>
                )}
              </div>
              <div style={{ fontSize:12, color:'#94a3b8', whiteSpace:'nowrap', flexShrink:0 }}>
                {filtered.length} of {fields.length} fields
              </div>
            </div>

            {/* Row 2: Filters */}
            <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
              {/* Custom / Built-in filter */}
              <div style={{ display:'flex', borderRadius:6, border:'1px solid #e2e8f0', overflow:'hidden', fontSize:12 }}>
                {[['all','All'],['custom','Custom'],['builtin','Built-in'],['notinuse','Not activated']].map(([val,lbl]) => (
                  <button key={val} onClick={() => setCustomFilter(val)} style={{ padding:'5px 11px', background:customFilter===val?'#1a2035':'white', color:customFilter===val?'white':'#475569', border:'none', cursor:'pointer', fontWeight:500, fontSize:12 }}>{lbl}</button>
                ))}
              </div>

              {/* Object filter */}
              <div style={{ display:'flex', borderRadius:6, border:'1px solid #e2e8f0', overflow:'hidden', fontSize:12 }}>
                {['All', ...OBJECT_TYPES].map(o => (
                  <button key={o} onClick={() => setObjectFilter(o)} style={{ padding:'5px 11px', background:objectFilter===o?'#1a2035':'white', color:objectFilter===o?'white':'#475569', border:'none', cursor:'pointer', fontWeight:500, fontSize:12 }}>{o}</button>
                ))}
              </div>

              <MultiSelect label="Type" options={allTypes.map(t => ({value:t, label:t}))} selected={typeFilter} onChange={setTypeFilter}
                colorFn={v => { const c = TYPE_COLORS[v] || {bg:'#f1f5f9',text:'#475569'}; return c; }} />
              <MultiSelect label="Tags" options={allTags.map(t => ({value:t, label:TAG_META[t]?.label || t}))} selected={tagFilter} onChange={setTagFilter} />
              <MultiSelect label="Depends on" options={allDepTypes.map(t => ({value:t, label:REF_META[t]?.label || t}))} selected={depTypeFilter} onChange={setDepTypeFilter} />
              <MultiSelect label="Contributes to" options={allConTypes.map(t => ({value:t, label:REF_META[t]?.label || t}))} selected={conTypeFilter} onChange={setConTypeFilter} />

              {/* Show description toggle */}
              <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:'#475569', cursor:'pointer', marginLeft:4 }}>
                <div onClick={() => setShowDesc(v=>!v)} style={{ width:30, height:16, borderRadius:8, background:showDesc?'#3b82f6':'#cbd5e1', position:'relative', transition:'background .15s', cursor:'pointer' }}>
                  <div style={{ position:'absolute', top:2, left:showDesc?14:2, width:12, height:12, borderRadius:'50%', background:'white', transition:'left .15s' }}></div>
                </div>
                Show description
              </label>

              {/* Show hidden toggle */}
              <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:'#475569', cursor:'pointer', marginLeft:4 }}>
                <div onClick={() => setShowHidden(v=>!v)} style={{ width:30, height:16, borderRadius:8, background:showHidden?'#3b82f6':'#cbd5e1', position:'relative', transition:'background .15s', cursor:'pointer' }}>
                  <div style={{ position:'absolute', top:2, left:showHidden?14:2, width:12, height:12, borderRadius:'50%', background:'white', transition:'left .15s' }}></div>
                </div>
                Show hidden
              </label>

              {/* Clear filters */}
              {activeFilterCount > 0 && (
                <button onClick={clearFilters} style={{ fontSize:12, color:'#3b82f6', background:'none', border:'none', cursor:'pointer', fontWeight:500 }}>
                  Clear {activeFilterCount} filter{activeFilterCount>1?'s':''}
                </button>
              )}
            </div>
          </div>

          {/* Bulk actions bar */}
          {selCount > 0 && (
            <div style={{ background:'#eff6ff', borderBottom:'1px solid #bfdbfe', padding:'8px 20px', display:'flex', alignItems:'center', gap:8, flexShrink:0, flexWrap:'wrap' }}>
              <span style={{ fontSize:13, fontWeight:600, color:'#374151' }}>{selCount} field{selCount>1?'s':''} selected</span>
              <button onClick={() => setSelectedIds(new Set())} style={{ fontSize:12, color:'#3b82f6', background:'none', border:'none', cursor:'pointer', padding:'0 2px', textDecoration:'underline', fontFamily:'inherit' }}>clear</button>
              <span style={{ width:1, height:20, background:'#bfdbfe', flexShrink:0, margin:'0 8px' }} />
              <button onClick={bulkShow} style={{ padding:'4px 12px', borderRadius:6, border:'1px solid #93c5fd', background:'white', color:'#1d4ed8', fontSize:12, fontWeight:600, cursor:'pointer' }}>Show</button>
              <button onClick={bulkHide} style={{ padding:'4px 12px', borderRadius:6, border:'1px solid #93c5fd', background:'white', color:'#1d4ed8', fontSize:12, fontWeight:600, cursor:'pointer' }}>Hide</button>
              <span style={{ width:1, height:20, background:'#bfdbfe', flexShrink:0, margin:'0 8px' }} />
              {showBulkTag
                ? <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
                    <input value={bulkTagInput} onChange={e => setBulkTagInput(e.target.value)} autoFocus placeholder="tag name"
                      onKeyDown={e => { if (e.key === 'Enter') bulkAddTag(); if (e.key === 'Escape') { setShowBulkTag(false); setBulkTagInput(''); } }}
                      style={{ fontSize:12, padding:'3px 8px', border:'1px solid #3b82f6', borderRadius:6, outline:'none', width:110, fontFamily:'inherit' }}
                    />
                    <button onClick={bulkAddTag} style={{ fontSize:11, color:'white', background:'#3b82f6', border:'none', borderRadius:6, padding:'4px 10px', cursor:'pointer', fontWeight:600 }}>Add to all</button>
                    <button onClick={() => { setShowBulkTag(false); setBulkTagInput(''); }} style={{ fontSize:11, color:'#64748b', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit' }}>Cancel</button>
                  </span>
                : <span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
                    <button onClick={() => setShowBulkTag(true)} style={{ padding:'4px 12px', borderRadius:6, border:'1px solid #93c5fd', background:'white', color:'#1d4ed8', fontSize:12, fontWeight:600, cursor:'pointer' }}>+ Add tag</button>
                    {bulkTagsInCommon.length > 0 && (
                      <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
                        <span style={{ fontSize:12, color:'#475569' }}>Remove:</span>
                        {bulkTagsInCommon.map(t => (
                          <button key={t} onClick={() => bulkRemoveTag(t)} style={{ fontSize:11, background:'#fee2e2', color:'#991b1b', border:'1px solid #fca5a5', borderRadius:6, padding:'2px 8px', cursor:'pointer', fontWeight:500 }}>× {t}</button>
                        ))}
                      </span>
                    )}
                  </span>
              }
            </div>
          )}

          {/* Table */}
          <div style={{ flex:1, overflowY:'auto' }}>
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13, borderBottom:'1px solid #e2e8f0' }}>
              <thead style={{ position:'sticky', top:0, zIndex:10 }}>
                <tr style={{ background:'#f8fafc', borderBottom:'2px solid #e2e8f0' }}>
                  <th style={{ padding:'8px 8px 8px 12px', width:32, verticalAlign:'top' }}>
                    <div onClick={toggleSelectAll} style={{ width:15, height:15, border:`1.5px solid ${selCount===filtered.length&&filtered.length>0?'#3b82f6':'#cbd5e1'}`, borderRadius:3, background:selCount===filtered.length&&filtered.length>0?'#3b82f6':'white', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
                      {selCount===filtered.length&&filtered.length>0 && <svg width="9" height="7" viewBox="0 0 9 7"><path d="M1 3.5L3.3 5.8L8 1" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/></svg>}
                      {selCount>0&&selCount<filtered.length && <div style={{width:7,height:1.5,background:'#3b82f6'}}></div>}
                    </div>
                  </th>
                  <th style={{ padding:'8px 12px', textAlign:'left', fontWeight:600, fontSize:11, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.04em', verticalAlign:'top' }}>Field</th>
                  <th style={{ padding:'8px 8px', textAlign:'left', fontWeight:600, fontSize:11, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.04em' }}>Object</th>
                  <th style={{ padding:'8px 8px', textAlign:'left', fontWeight:600, fontSize:11, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.04em' }}>Type</th>
                  <th style={{ padding:'8px 8px', textAlign:'left', fontWeight:600, fontSize:11, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.04em' }}>Tags</th>
                  <th style={{ padding:'8px 8px', textAlign:'left', fontWeight:600, fontSize:11, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.04em', minWidth:150 }}>Depends On</th>
                  <th style={{ padding:'8px 8px', textAlign:'left', fontWeight:600, fontSize:11, color:'#64748b', textTransform:'uppercase', letterSpacing:'0.04em', minWidth:150 }}>Contributes To</th>
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 && (
                  <tr><td colSpan={7} style={{ padding:40, textAlign:'center', fontSize:14 }}>
                    {hiddenMatchCount > 0 ? (
                      <div>
                        <div style={{ color:'#94a3b8', marginBottom:8 }}>No visible fields match your filters.</div>
                        <div style={{ color:'#64748b', fontSize:13 }}>
                          {`${hiddenMatchCount} hidden ${hiddenMatchCount === 1 ? 'field' : 'fields'} would match — `}
                          <button onClick={() => setShowHidden(true)} style={{ color:'#6366f1', background:'none', border:'none', cursor:'pointer', fontSize:13, padding:0, fontWeight:600 }}>
                            show hidden fields
                          </button>
                        </div>
                      </div>
                    ) : (
                      <div style={{ color:'#94a3b8' }}>No fields match your filters.</div>
                    )}
                  </td></tr>
                )}
                {filtered.map(field => (
                  <FieldRow key={field.id} field={field} isSelected={selectedIds.has(field.id)} onToggleSelect={toggleSelect} onClick={openField} onInspect={setInspector} customApiNames={customApiNames} showDesc={showDesc} search={search} />
                ))}
              </tbody>
            </table>
          </div>
          </>}
        </>
      )}

      {view === 'detail' && selectedField && (
        <FieldDetail field={selectedField} onBack={goBack} onInspect={setInspector} onUpdateField={updateField} customApiNames={customApiNames} allFields={fields} onOpenField={openField} />
      )}

      <Inspector inspector={inspector} onClose={() => setInspector(null)} onOpenField={f => { setInspector(null); openField(f); }} />
      {showNewField && <NewFieldModal onClose={() => setShowNewField(false)} />}
        </div>{/* end content column */}
      </div>{/* end flex row */}
    </div>
  );
}

// ─────────────────────────────────────────────
// 12. BOOT
// ─────────────────────────────────────────────

const rootEl = document.getElementById('root');
rootEl.style.display = 'flex';

ReactDOM.createRoot(rootEl).render(<App />);


</script>
</body>
</html>
