    body: There's something we didn't cover when talking about the "5 whys" that should be mentioned. One of the things that can happen when you do the "5 whys" technique (some people call it "7 whys") is that you can get a leap to a very abstract level that doesn't actually illuminate anything; the person you're talking to takes your questioning as an intellectual challenge and makes a broad statement that encompasses the topic you're talking about but is too vague to really get a handle on. Usually this statement would fail to communicate much of interest to a person not directly involved in the conversation, which is the clearest sign of its weakness. An analog of this is the vague job title or business description that doesn't tell you what is actually done. "I'm an analog solutions provider." The trick in these situations is to bring the discussion back down toward specifics by asking an investigatory question, such as "what makes that special," "what makes that necessary," "why do I want that," "what would it be like to have this" — to bring the umbrella term back to something an individual person would experience. Sometimes you need a few "what" questions to drop down to a useful level again.
