      VUCA and Vuca Prime
      * combat Volatility with Vision – the ability to establish a stable idea of the compelling future
      * combat Uncertainty with Understanding – the ability to gather diverse perspectives and seek root causes
      * combat Complexity with Clarity – the ability to bring focus to what truly matters
      * combat Ambiguity with Agility – the ability to make small investments and pivot quickly as you learn
